# Release 工作流：为 Windows 构建并发布 audio_router.exe
# 触发：push 到语义化 tag（例如 v1.2.3）会创建 GitHub Release 并上传 exe
name: "Release — Windows"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "要发布的 tag，例如 v1.0.0"
        required: false

permissions:
  contents: write

jobs:
  build-windows:
    name: Build & release (Windows)
    runs-on: windows-latest
    env:
      WINDOWS_SIGN_CERT: ${{ secrets.WINDOWS_SIGN_CERT }}
      WINDOWS_SIGN_PASSWORD: ${{ secrets.WINDOWS_SIGN_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve release tag
        shell: pwsh
        run: |
          if ('${{ github.event.inputs.tag }}' -ne '') {
            $tag = '${{ github.event.inputs.tag }}'
          } elseif ('${{ github.ref }}' -like 'refs/tags/*') {
            $tag = '${{ github.ref_name }}'
          } else {
            Write-Error "No tag provided."
            exit 1
          }
          if ($tag -notmatch '^[vV]\d') {
            Write-Error "Invalid tag format: $tag"
            exit 1
          }
          echo "RELEASE_TAG=$tag" >> $env:GITHUB_ENV

      - name: Checkout release tag
        shell: pwsh
        run: git checkout --detach $env:RELEASE_TAG

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build artifacts
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-

      - name: Build audio_router (release)
        # 使用 cargo 构建原生 Windows 二进制（无 WebView/Node.js 依赖）
        run: cargo build --locked --release --package audio_router

      - name: Decode & import PFX (only if provided)
        if: ${{ env.WINDOWS_SIGN_CERT && env.WINDOWS_SIGN_PASSWORD }}
        shell: pwsh
        run: |
          Write-Host "Decoding PFX from secret and writing to runner temp"
          [System.IO.File]::WriteAllBytes("$env:RUNNER_TEMP\codesign.pfx", [System.Convert]::FromBase64String('${{ env.WINDOWS_SIGN_CERT }}'))
          Write-Host "Importing PFX into personal cert store"
          certutil -f -p "${{ env.WINDOWS_SIGN_PASSWORD }}" -importpfx "$env:RUNNER_TEMP\codesign.pfx"

      - name: Sign executable (only if cert provided)
        if: ${{ env.WINDOWS_SIGN_CERT && env.WINDOWS_SIGN_PASSWORD }}
        shell: pwsh
        run: |
          Write-Host "Signing exe"
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match '\\x64\\signtool\.exe$' } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $signtool) {
            Write-Error "signtool.exe not found"
            exit 1
          }
          & $signtool.FullName sign /v /fd SHA256 /a /tr http://timestamp.digicert.com /td SHA256 "target\release\audio_router.exe"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            target/release/audio_router.exe
          fail_on_unmatched_files: false
          generate_release_notes: true
          name: AudioRouter ${{ env.RELEASE_TAG }}
